name: CI/CD

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Grant execute permission to mvnw
        run: chmod +x mvnw

      - name: Run tests and package application
        run: ./mvnw -B clean verify

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: teamheart-jar
          path: target/*.jar

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate staging compose
        run: |
          cp .env.staging.example .env.staging
          docker compose --env-file .env.staging -f docker-compose.yml -f docker-compose.staging.yml config

      - name: Trigger Render staging deploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_STAGING_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "Secret RENDER_STAGING_DEPLOY_HOOK nao configurado."
            exit 1
          fi
          curl --fail --silent --show-error --request POST "$RENDER_DEPLOY_HOOK"
          echo "Deploy de staging acionado no Render."

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate production compose
        run: |
          cp .env.production.example .env.production
          docker compose --env-file .env.production -f docker-compose.yml -f docker-compose.production.yml config

      - name: Trigger Render production deploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_PRODUCTION_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "Secret RENDER_PRODUCTION_DEPLOY_HOOK nao configurado."
            exit 1
          fi
          curl --fail --silent --show-error --request POST "$RENDER_DEPLOY_HOOK"
          echo "Deploy de producao acionado no Render."
